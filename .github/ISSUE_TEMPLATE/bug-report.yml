# GENERATED by community/scripts/generate_issue_labels.py from devices.json — do not edit by hand.
name: Bug report (community device)
description: Report a problem with a community-supported device.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **This is the community devices repo.** Only report issues
        for community-supported devices here — never on the upstream
        EspControl repo. For questions about how EspControl itself
        works, see the [upstream docs](https://jtenniswood.github.io/espcontrol/).
  - type: dropdown
    id: device
    attributes:
      label: Which device?
      description: The community device this issue is about.
      options:
        - Guition ESP32-S3-JC3248W535
        - Lilygo JC3248W535
        - Seeed reTerminal D1001
        - Seeed SenseCAP Indicator D1
        - Tuya T3E Smart Panel
        - Waveshare ESP32-P4-WIFI6-Touch-LCD-10.1
        - Waveshare ESP32-S3-Touch-LCD-4
        - Other / not sure
    validations:
      required: true
  - type: input
    id: firmware-version
    attributes:
      label: Firmware version
      description: From the panel's About page (e.g. v0.0.9-upstream.v2.6.3).
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: This is a community device, and I am not filing this on the upstream repo.
          required: true
        - label: I understand community builds may be buggier than officially supported panels.
          required: true
