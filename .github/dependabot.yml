version: 2
updates:
  # Keep pinned GitHub Actions current (security + version bumps).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    labels: ["ci"]
    # Let a new release bake for 7 days before opening the PR, so a freshly
    # published (possibly buggy) version isn't taken immediately.
    cooldown:
      default-days: 7

  # Keep the docs toolchain (VitePress) current.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels: ["docs"]
    cooldown:
      default-days: 7
