name: Dependabot auto-merge

# Auto-merges Dependabot PRs for MINOR and PATCH updates (and GitHub Actions
# bumps) once required checks pass. MAJOR updates are left for manual review.
# The 7-day post-release delay is handled by `cooldown` in dependabot.yml, so
# by the time a PR exists the version has already baked — enabling auto-merge
# here merges it as soon as CI is green.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor/patch
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "$PR_URL"
