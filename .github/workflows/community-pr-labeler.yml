name: PR Labeler

# Auto-labels PRs by area (docs / firmware / ci / tooling) based on the
# files changed, per .github/labeler.yml.

on: [pull_request_target]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v7
        with:
          sync-labels: true
