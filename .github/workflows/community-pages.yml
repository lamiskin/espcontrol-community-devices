name: Community Pages

# Single owner of the GitHub Pages deployment. Rebuilds the ENTIRE site on
# every run:
#   - the VitePress docs site (device pages generated from STATUS + catalog)
#   - firmware manifests + binaries: downloaded from the latest GitHub Release
#   - webserver/www.js: built from the assembled tree at the current pin
# Triggered after releases, on status/registry changes to main, or manually.
# No other workflow may deploy Pages — a second deployer caused a race
# between whole-site deploys.

on:
  workflow_run:
    workflows: ["Community Release"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - community/STATUS.md
      - community/devices.json
      - community/catalog-fragment.json
      - community/scripts/generate_docs.py
      - docs/**
      - package.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Generate device docs pages
        run: python3 community/scripts/generate_docs.py

      # VitePress empties community-pages/, so it must run before firmware
      # and www.js are staged into it.
      - name: Build docs site
        run: npx vitepress build docs

      - name: Assemble (builds www.js)
        run: python3 community/scripts/assemble.py --skip-checks

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          # Distinguish "no release exists" (fine: deploy without firmware)
          # from a transient API failure (fatal: deploying a firmware-less
          # site over a good one is how an outage broke the installer once).
          if ! TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName 2>/tmp/relerr); then
            if grep -qiE "release not found|HTTP 404" /tmp/relerr; then
              echo "No releases exist yet — deploying docs without firmware content."
              exit 0
            fi
            echo "ERROR: could not query latest release:" >&2
            cat /tmp/relerr >&2
            exit 1
          fi
          echo "Latest release: $TAG"
          for attempt in 1 2 3; do
            if gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "*.bin" --pattern "*-manifest.json" \
                --dir release-assets; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "ERROR: release asset download failed after 3 attempts" >&2
              exit 1
            fi
            echo "Download attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          for manifest in release-assets/*-manifest.json; do
            [ -e "$manifest" ] || continue
            base=$(basename "$manifest")
            slug="${base%-manifest.json}"
            mkdir -p "community-pages/firmware/$slug"
            cp "$manifest" "community-pages/firmware/$slug/manifest.json"
            cp "release-assets/${slug}.factory.bin" "community-pages/firmware/$slug/" 2>/dev/null || echo "WARNING: no factory.bin for $slug"
            cp "release-assets/${slug}.ota.bin" "community-pages/firmware/$slug/" 2>/dev/null || echo "WARNING: no ota.bin for $slug"
          done
          echo "Firmware content staged from $TAG:"
          find community-pages/firmware -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: community-pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
