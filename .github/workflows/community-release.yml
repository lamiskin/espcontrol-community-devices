name: Community Release

on:
  push:
    tags:
      - "community-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (community-v*)"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Extract version from tag: community-vX.Y.Z+<pin> or community-vX.Y.Z-upstream.<pin>
          VERSION=$(echo "$TAG" | sed 's/^community-//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: Assemble
        run: python3 community/scripts/assemble.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: pip install esphome==$(grep ESPHOME_VERSION .assembly/.github/esphome.env | cut -d= -f2)

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .assembly/.esphome
          key: pio-release-${{ hashFiles('community/upstream-ref.txt') }}
          restore-keys: |
            pio-release-
            pio-

      - name: Compile and collect firmware
        run: |
          DEVICES=$(python3 -c "import json; print('\n'.join(json.load(open('community/devices.json'))['devices']))")
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Make www.js accessible where factory builds expect it
          mkdir -p .assembly/community-pages/webserver
          cp community-pages/webserver/www.js .assembly/community-pages/webserver/www.js

          mkdir -p release-artifacts

          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            echo "=== Compiling $slug ==="

            # Patch firmware_version in the factory build
            cd .assembly
            sed -i "s/firmware_version: \"0.0.0\"/firmware_version: \"$VERSION\"/" \
              "builds/${slug}.factory.yaml" 2>/dev/null || true
            sed -i "s/firmware_version: \"dev\"/firmware_version: \"$VERSION\"/" \
              "builds/${slug}.factory.yaml" 2>/dev/null || true

            # Fix external_components path for non-Docker CI (no /config mount)
            ASSEMBLY_ABS="$(pwd)"
            sed -i "s|file:///config|file://${ASSEMBLY_ABS}|g" "builds/${slug}.factory.yaml"

            esphome compile "builds/${slug}.factory.yaml"

            # Find binaries
            FACTORY=$(find builds/.esphome/build -name "firmware.factory.bin" | head -1)
            OTA=$(find builds/.esphome/build -name "firmware.ota.bin" | head -1)

            if [ -z "$FACTORY" ] || [ -z "$OTA" ]; then
              echo "ERROR: compiled binaries not found for ${slug}" \
                "(factory='$FACTORY' ota='$OTA') — release aborted" >&2
              exit 1
            fi

            cp "$FACTORY" "../release-artifacts/${slug}.factory.bin"
            cp "$OTA" "../release-artifacts/${slug}.ota.bin"

            # Generate manifest (device name + chip family resolved from
            # the repo; hard-fails on ambiguity instead of defaulting)
            OTA_MD5=$(md5sum "../release-artifacts/${slug}.ota.bin" | cut -d' ' -f1)
            python3 ../community/scripts/generate_manifest.py "$slug" \
              --version "$VERSION" \
              --tag "$TAG" \
              --ota-md5 "$OTA_MD5" \
              --output "../release-artifacts/${slug}-manifest.json"

            # Clean build dir for next device
            rm -rf builds/.esphome/build
            cd ..
          done <<< "$DEVICES"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          UPSTREAM_REF=$(cat community/upstream-ref.txt)

          # Find previous release tag for changelog
          PREV_TAG=$(git tag --list 'community-v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          # Build release notes in a file (raw newlines inside a quoted shell
          # string would sit at column 0 and break the YAML block scalar)
          NOTES_FILE=$(mktemp)
          {
            echo "Based on [espcontrol ${UPSTREAM_REF}](https://github.com/jtenniswood/espcontrol/releases/tag/${UPSTREAM_REF})."
            echo ""
            echo "## What's Changed"
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" -- | grep -v "^$" || true)
              if [ -n "$CHANGELOG" ]; then
                echo "$CHANGELOG"
              else
                echo "- No notable changes since ${PREV_TAG}"
              fi
            else
              echo "- Initial release"
            fi
          } > "$NOTES_FILE"

          # Collect all binary files
          FILES=$(find release-artifacts -name "*.bin" -o -name "*-manifest.json" | sort)
          gh release create "$TAG" $FILES \
            --title "${VERSION}" \
            --notes-file "$NOTES_FILE"

      # Pages deployment is owned entirely by community-pages.yml, which
      # triggers on this workflow's completion and rebuilds the site from
      # this release's attached assets. Deploying from here as well caused
      # a race between two whole-site deploys (one of which had no firmware
      # content in its checkout).
