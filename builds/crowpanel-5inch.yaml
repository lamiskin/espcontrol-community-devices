# =============================================================================
# BUILD PROFILE - Elecrow CrowPanel Advance 5" (800×480 landscape)
# =============================================================================
# CI/local build entry point for the 800×480 landscape ESP32-S3 panel.
# Loads the web UI from GitHub Pages so CI can skip building www.js.
# =============================================================================

substitutions:
  name: "espcontrol-crowpanel5"
  friendly_name: "CrowPanel 5 inch"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"
  partitions_path: "../devices/crowpanel-5inch/partitions.csv"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/crowpanel-5inch/packages.yaml

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
  ap:
    ssid: "${friendly_name}"

captive_portal:

web_server:
  js_url: "https://lamiskin.github.io/espcontrol-community-devices/webserver/www.js"
