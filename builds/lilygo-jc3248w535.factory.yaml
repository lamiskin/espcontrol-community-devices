# =============================================================================
# FACTORY BUILD - Lilygo JC3248W535 (3.2" portrait)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  name: "espcontrol-lilygo-jc32"
  friendly_name: "Lilygo JC3248W535 (Community)"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include ../devices/lilygo-jc3248w535/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: lamiskin.espcontrol-community
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://lamiskin/espcontrol-community-devices/devices/lilygo-jc3248w535/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../community-pages/webserver/www.js"

wifi:
  ap:
    ssid: "${name}"

captive_portal:
