# =============================================================================
# BUILD PROFILE - Guition ESP32-S3-JC3248W535 (3.5" landscape)
# =============================================================================
# CI/local build entry point for the 480x320 landscape ESP32-S3 panel.
# Bundles the matching web UI so branch/release builds do not load the shared
# GitHub Pages copy from main.
# =============================================================================

substitutions:
  name: "espcontrol-jc3248w535"
  friendly_name: "Guition ESP32-S3-JC3248W535"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/guition-esp32-s3-jc3248w535/packages.yaml

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
  ap:
    ssid: "${friendly_name}"

captive_portal:

web_server:
  js_url: ""
  js_include: "../community-pages/webserver/www.js"
