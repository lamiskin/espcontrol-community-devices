# =============================================================================
# FACTORY BUILD - Elecrow CrowPanel Advance 5" (800×480 landscape)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  name: "espcontrol-crowpanel5"
  friendly_name: "CrowPanel 5 inch"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"
  partitions_path: "../devices/crowpanel-5inch/partitions.csv"

packages:
  core: !include ../devices/crowpanel-5inch/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: lamiskin.espcontrol-community
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://lamiskin/espcontrol-community-devices/devices/crowpanel-5inch/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../community-pages/webserver/www.js"

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
