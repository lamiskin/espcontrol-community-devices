# =============================================================================
# FACTORY BUILD - Waveshare ESP32-S3-Touch-LCD-4 (4" square, Rev 4)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  name: "espcontrol-wslcd4"
  friendly_name: "Waveshare ESP32-S3-Touch-LCD-4"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include ../devices/waveshare-esp32-s3-touch-lcd-4/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: lamiskin.espcontrol-community
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://lamiskin/espcontrol-community-devices/devices/waveshare-esp32-s3-touch-lcd-4/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../community-pages/webserver/www.js"

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
