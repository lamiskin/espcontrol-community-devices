# =============================================================================
# BUILD PROFILE - Seeed reTerminal D1001 (8" landscape ESP32-P4)
# =============================================================================
# CI/local build entry point for the 1280x800 landscape ESP32-P4 panel.
# Loads the web UI from GitHub Pages so CI can skip building www.js.
# =============================================================================

substitutions:
  name: "espcontrol-d1001"
  friendly_name: "Seeed reTerminal D1001 (Community)"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/seeed-esp32-p4-reterminal-d1001/packages.yaml

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
  ap:
    ssid: "${name}"

captive_portal:

web_server:
  js_url: "https://lamiskin.github.io/espcontrol-community-devices/webserver/www.js"
