# =============================================================================
# FACTORY BUILD - Tuya T3E Smart Panel (4" square)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  name: "espcontrol-tuya-t3e"
  friendly_name: "Tuya T3E Smart Panel"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include ../devices/tuya-t3e/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: lamiskin.espcontrol-community
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://lamiskin/espcontrol-community-devices/devices/tuya-t3e/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../community-pages/webserver/www.js"

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
