# =============================================================================
# DEVICE - Seeed SenseCAP Indicator D1 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" SenseCAP
# Indicator D1. Includes the ESP32-S3 SoC, MIPI RGB display, FT5x06
# capacitive touchscreen, PCA9554 expander, user button, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "v2.6.3"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (8MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      # The S3 display stack leaves little internal RAM for HTTPS OTA checks.
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Keep the ESP32 task watchdog long enough for display startup while
      # remaining compatible with ESPHome 2026.4 and newer.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      # Keep WiFi startup inside the internal-RAM budget after the RGB display
      # and LVGL buffers are initialized.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and MIPI RGB display can fail to reinitialize
# peripherals after a software reset. A brief deep sleep forces a hardware
# reset on wake, equivalent to a power cycle.
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=9"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Marking OTA image valid before hardware-reset workaround");
                id(sensecap_d1_safe_mode).mark_successful();
                global_preferences->sync();
                esp_sleep_enable_timer_wakeup(100000);
                esp_deep_sleep_start();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: 700
      then:
        - logger.log:
            tag: sensecap
            level: INFO
            format: "SenseCAP Indicator D1 EspControl package booting"
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: sensecap_d1_safe_mode
  boot_is_good_after: 10s

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# The S3 panel runs close to the internal RAM limit once the RGB display,
# LVGL, web UI, and API are all active. Keep the native API connection pool
# modest, but allow one spare slot so Home Assistant can reconnect after an
# abrupt OTA reset while the ESPHome dashboard/logger still has a socket open.
# Give the send queue extra headroom so reconnect bursts and compact Home
# Assistant action responses do not drop the API connection on this low-memory
# panel.
api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

logger:
  hardware_uart: UART0

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: gpio_backlight_pwm
    frequency: 100Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(display_mode_controller).target_source_is(
                            espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                        id(display_mode_controller).target_mode_is(
                            espcontrol::DisplayMode::DISPLAY_OFF)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(display_mode_controller).current_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF);
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).target_mode_is(
                    espcontrol::DisplayMode::ACTIVE);
            then:
              - script.execute: screen_schedule_manual_sleep

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
    name: User Button
    id: user_button
    on_press:
      then:
        - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# SPI bus (used by MIPI RGB driver for ST7701S init sequence)
# ---------------------------------------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48
    miso_pin: GPIO47

# ---------------------------------------------------------------------------
# I2C bus, IO expander, and touchscreen (FT5x06 capacitive)
# ---------------------------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16

touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    update_interval: 16ms
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (3.95" 480x480 MIPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: SEEED-INDICATOR-D1
    id: my_display
    setup_priority: 240
    update_interval: never
    auto_clear_enabled: False

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  # Keep LVGL after WiFi and after the display driver.
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 180
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 270
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 0
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 90
                      else:
                        - lvgl.display.set_rotation: 180

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "180"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
