# =============================================================================
# PACKAGES - ESPHome include manifest
# =============================================================================
# Load order follows dependencies: device and assets first, then config,
# addons, and screens. Loading screen must be the first page so LVGL shows
# it at startup. Main page (lvgl.yaml) is included after setup screens.
# =============================================================================

substitutions:
  cover_art_placeholder_file: "https://raw.githubusercontent.com/jtenniswood/espcontrol/main/common/assets/cover_art_placeholder.svg"
  device_slug: "seeed-esp32-p4-reterminal-d1001"
  firmware_manifest_slug: "seeed-esp32-p4-reterminal-d1001"
  firmware_version: "dev"
  screen_width: "1280"
  screen_height: "800"
  content_width: "760"
  setup_icon_font_id: font_icon_main
  setup_title_font_id: font_text_title
  setup_body_font_id: font_text_body
  setup_pad_row: "20"
  setup_loading_pad_row: "40"
  setup_action_button_width: "200"
  setup_action_button_height: "56"
  setup_action_button_radius: "12"
  icon_font: font_icon_main
  subpage_chevron_font: font_icon_status
  label_font: font_text_body
  media_title_font: font_text_title
  unit_font: font_text_body
  sensor_value_font: font_number_value
  padding: 18px
  radius: 11px
  main_page_card_gap: "10"
  main_page_pad_top: "46"
  main_page_compact_pad_top: "5"
  clock_bar_item_gap: "78"
  clock_bar_visual_gap: "10"
  voice_clock_bar_hide_code: ""
  voice_clock_bar_apply_code: ""
  navigate_voice_target_code: |-
    ESP_LOGW("navigation", "Voice volume target is not available on this device");
  voice_interaction_active_condition: "false"
  clock_font_size: "220"
  clock_cx: "640"
  clock_cy: "400"
  screen_saver_clock_min_brightness: "1"
  screen_saver_clock_default_brightness: "35"
  screen_schedule_clock_min_brightness: "1"
  screen_schedule_clock_default_brightness: "10"
  cover_art_size: "800"
  cover_art_decode_size: "800"
  cover_art_x: "0"
  cover_art_y: "0"
  cover_art_accent_x: "800"
  cover_art_accent_y: "0"
  cover_art_accent_width: "480"
  cover_art_accent_height: "800"
  cover_art_accent_bg_opa: "100%"
  cover_art_accent_opa: "100%"
  cover_art_panel_x: "840"
  cover_art_panel_y: "40"
  cover_art_panel_width: "400"
  cover_art_panel_height: "720"
  cover_art_panel_pad_top: "0"
  cover_art_panel_pad_bottom: "0"
  cover_art_panel_pad_left: "0"
  cover_art_panel_pad_right: "0"
  cover_art_panel_pad_row: "0"
  cover_art_title_font: "font_cover_art_title"
  cover_art_title_max_height: "506"
  cover_art_title_line_space: "0"
  cover_art_artist_font: "font_cover_art_artist"
  cover_art_artist_pad_top: "4"
  cover_art_artist_long_mode: "wrap"
  cover_art_time_font: "font_cover_art_time"
  cover_art_time_pad_top: "12"
  cover_art_progress_width: "1280"
  cover_art_progress_height: "4"
  cover_art_text_color: "0xFFF5E0"
  cover_art_square_overlay: "false"
  cover_art_live_image_updates: "false"

packages:
  upstream_a:
    url: https://github.com/jtenniswood/espcontrol
    ref: 78e8ba5d8ea4e0fcc4ddf877a9d4fdb809fb85da
    refresh: 1d
    files:
      - common/config/entity_names.yaml
  device: !include device/device.yaml
  upstream_b:
    url: https://github.com/jtenniswood/espcontrol
    ref: 78e8ba5d8ea4e0fcc4ddf877a9d4fdb809fb85da
    refresh: 1d
    files:
      - common/device/esp32_c6_firmware_update.yaml
      - common/assets/icons.yaml
  fonts_device: !include device/fonts.yaml
  upstream_c:
    url: https://github.com/jtenniswood/espcontrol
    ref: 78e8ba5d8ea4e0fcc4ddf877a9d4fdb809fb85da
    refresh: 1d
    files:
      - common/theme/button.yaml
      - common/config/colors.yaml
      - common/config/button_order.yaml
      - common/config/display.yaml
      # BEGIN GENERATED BUTTON PACKAGES
      # Generated by scripts/generate_device_slots.py from devices/manifest.json.
      # Per-button entity/label/icon (20 slots - 5x4 grid)
      - path: common/config/button_template.yaml
        vars: { num: "1" }
      - path: common/config/button_template.yaml
        vars: { num: "2" }
      - path: common/config/button_template.yaml
        vars: { num: "3" }
      - path: common/config/button_template.yaml
        vars: { num: "4" }
      - path: common/config/button_template.yaml
        vars: { num: "5" }
      - path: common/config/button_template.yaml
        vars: { num: "6" }
      - path: common/config/button_template.yaml
        vars: { num: "7" }
      - path: common/config/button_template.yaml
        vars: { num: "8" }
      - path: common/config/button_template.yaml
        vars: { num: "9" }
      - path: common/config/button_template.yaml
        vars: { num: "10" }
      - path: common/config/button_template.yaml
        vars: { num: "11" }
      - path: common/config/button_template.yaml
        vars: { num: "12" }
      - path: common/config/button_template.yaml
        vars: { num: "13" }
      - path: common/config/button_template.yaml
        vars: { num: "14" }
      - path: common/config/button_template.yaml
        vars: { num: "15" }
      - path: common/config/button_template.yaml
        vars: { num: "16" }
      - path: common/config/button_template.yaml
        vars: { num: "17" }
      - path: common/config/button_template.yaml
        vars: { num: "18" }
      - path: common/config/button_template.yaml
        vars: { num: "19" }
      - path: common/config/button_template.yaml
        vars: { num: "20" }
      # END GENERATED BUTTON PACKAGES
      - common/addon/connectivity.yaml
      - common/device/api_navigate.yaml
      - common/addon/time.yaml
      - common/addon/backlight.yaml
      - common/addon/backlight_schedule.yaml
      - common/addon/network.yaml
      - common/addon/memory_diagnostics.yaml
      - common/addon/firmware_update.yaml
  power: !include device/power.yaml
  audio: !include device/audio.yaml
  microphone: !include device/microphone.yaml
  upstream_d:
    url: https://github.com/jtenniswood/espcontrol
    ref: 78e8ba5d8ea4e0fcc4ddf877a9d4fdb809fb85da
    refresh: 1d
    files:
      - common/device/screen_loading.yaml
      - common/device/screen_wifi_setup.yaml
      - common/device/screen_ha_setup.yaml
      - common/device/screen_ha_actions.yaml
      - common/device/screen_button_setup.yaml
      - common/device/screen_clock.yaml
      - common/device/screen_cover_art.yaml
      - common/device/image_cards_6.yaml
  lvgl: !include device/lvgl.yaml
  sensors: !include device/sensors.yaml

# --- community hosting overrides ---
web_server:
  js_url: https://lamiskin.github.io/espcontrol-community-devices/webserver/www.js?device=${device_slug}&v=${firmware_version}

update:
  - id: !extend firmware_update
    source: https://lamiskin.github.io/espcontrol-community-devices/firmware/${firmware_manifest_slug}/manifest.json
