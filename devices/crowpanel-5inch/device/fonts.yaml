# =============================================================================
# FONTS - Generic style IDs for the 800x480 landscape display
# =============================================================================
# Scaled for 5x3 grid cells (~150x138px). Smaller than portrait devices.
# =============================================================================

font:
  # Main action/setup icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_main
    size: 42
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Smaller card icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_card
    size: 32
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Status, network, and subpage icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_status
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # Main labels and setup body text
  - file: "gfonts://Roboto"
    id: font_text_body
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Compact supporting text
  - file: "gfonts://Roboto"
    id: font_text_small
    size: 18
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Headings and media titles
  - file: "gfonts://Roboto@Light"
    id: font_text_title
    size: 38
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver title
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_title
    size: 46
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media control modal title
  - file: "gfonts://Roboto@Light"
    id: font_media_control_title
    size: 60
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver artist
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_artist
    size: 32
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver elapsed time
  - file: "gfonts://Roboto"
    id: font_cover_art_time
    size: 22
    bpp: 4
    glyphs: " 0123456789:/-"

  # Normal sensor values
  - file: "gfonts://Roboto@Light"
    id: font_number_value
    size: 42
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large sensor values
  - file: "gfonts://Roboto@Thin"
    id: font_number_value_large
    size: 108
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large modal numbers
  - file: "gfonts://Roboto@Thin"
    id: font_number_modal
    size: 96
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
