# =============================================================================
# DEVICE - CrowPanel Advance 5" HMI (ESP32-S3, 800×480 landscape)
# =============================================================================
# Hardware: Elecrow CrowPanel Advance 5.0" (ESP32-S3-WROOM-1-N16R8)
# Display:  ST7262 RGB parallel LCD, 800×480 via rpi_dpi_rgb
# Touch:    GT911 capacitive (I2C SDA=GPIO19, SCL=GPIO20)
# Backlight: LEDC PWM on GPIO2 (frequency 1220Hz)
# PSRAM:    8MB OPI (qio_opi memory type)
#
# Pin assignments from working reference config (5.0_ESPHome.yaml):
#   DE    : GPIO40   HSYNC : GPIO39   VSYNC : GPIO41   PCLK : GPIO0 (12MHz)
#   Red   : 45, 48, 47, 21, 14
#   Green : 5, 6, 7, 15, 16, 4
#   Blue  : 8, 3, 46, 9, 1
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "v2.6.3"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (4MB flash, ESP-IDF framework)
# esp32s3box board gives QIO flash mode, enabling full access.
# ---------------------------------------------------------------------------
esp32:
  board: esp32s3box
  flash_size: 4MB
  partitions: ${partitions_path}
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DBOARD_HAS_PSRAM"
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=15"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            if (esp_reset_reason() == ESP_RST_USB || esp_reset_reason() == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation
        - script.execute: clock_bar_apply

# ---------------------------------------------------------------------------
# PSRAM (8MB OPI)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA (USB/serial only — 4MB flash, no room for dual partitions)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

logger:
  hardware_uart: UART0

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM on GPIO2, frequency 1220Hz)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO2
    frequency: 1220Hz
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(display_mode_controller).target_source_is(
                            espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                        id(display_mode_controller).target_mode_is(
                            espcontrol::DisplayMode::DISPLAY_OFF)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(display_mode_controller).current_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF);
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).target_mode_is(
                    espcontrol::DisplayMode::ACTIVE);
            then:
              - script.execute: screen_schedule_manual_sleep

# ---------------------------------------------------------------------------
# I2C bus (GT911 touch controller)
# ---------------------------------------------------------------------------
i2c:
  id: i2c_bus
  sda: GPIO19
  scl: GPIO20
  scan: false
  frequency: 400kHz

# ---------------------------------------------------------------------------
# Touchscreen (GT911 capacitive)
# ---------------------------------------------------------------------------
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: i2c_bus
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (ST7262 RGB parallel LCD, 800×480)
# ---------------------------------------------------------------------------
display:
  - platform: rpi_dpi_rgb
    id: my_display
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: GPIO40
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    pclk_pin: GPIO0
    pclk_frequency: 12MHz
    data_pins:
      red:
        - GPIO45
        - GPIO48
        - GPIO47
        - GPIO21
        - GPIO14
      green:
        - GPIO5
        - GPIO6
        - GPIO7
        - GPIO15
        - GPIO16
        - GPIO4
      blue:
        - GPIO8
        - GPIO3
        - GPIO46
        - GPIO9
        - GPIO1

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 0
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
              - script.execute: refresh_button_grid
